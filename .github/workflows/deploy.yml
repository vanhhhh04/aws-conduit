name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: 972766771187.dkr.ecr.ap-southeast-1.amazonaws.com
  EC2_HOST: 54.255.167.12
  EC2_USER: ec2-user

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/conduit/backend:${{ github.sha }} \
            ./backend/realWorld-DjangoRestFramework
          docker push $ECR_REGISTRY/conduit/backend:${{ github.sha }}

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/conduit/frontend:${{ github.sha }} \
            --build-arg REACT_APP_BACKEND_URL=http://${{ env.EC2_HOST }}/api \
            ./frontend/react-redux-realworld-example-app
          docker push $ECR_REGISTRY/conduit/frontend:${{ github.sha }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Refresh ECR login (token expires every 12h)
            aws ecr get-login-password --region ap-southeast-1 \
              | sudo kubectl create secret docker-registry ecr-secret \
                  --docker-server=972766771187.dkr.ecr.ap-southeast-1.amazonaws.com \
                  --docker-username=AWS \
                  --docker-password=$(aws ecr get-login-password --region ap-southeast-1) \
                  --dry-run=client -o yaml \
              | sudo kubectl apply -f -

            # Update images to the new commit SHA
            sudo kubectl set image deployment/backend \
              backend=972766771187.dkr.ecr.ap-southeast-1.amazonaws.com/conduit/backend:${{ github.sha }}
            sudo kubectl set image deployment/frontend \
              frontend=972766771187.dkr.ecr.ap-southeast-1.amazonaws.com/conduit/frontend:${{ github.sha }}

            # Wait for rollout to complete
            sudo kubectl rollout status deployment/backend --timeout=120s
            sudo kubectl rollout status deployment/frontend --timeout=120s
