apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: backend
          image: 972766771187.dkr.ecr.ap-southeast-1.amazonaws.com/conduit/backend:latest
          command: ["sh", "-c", "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"]
          ports:
            - containerPort: 8000
          env:
            - name: DEBUG
              value: "False"
            - name: DJANGO_SECRET_KEY
              value: "demo-k3s-insecure-key-change-in-prod"
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings"
            - name: DB_NAME
              value: conduit
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: ALLOWED_HOSTS
              value: "54.255.167.12,localhost,127.0.0.1"
          readinessProbe:
            httpGet:
              path: /api/health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            - name: CORS_ALLOWED_ORIGINS
              value: "http://54.255.167.12"
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
